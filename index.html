<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff7f0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <title>Ross Workout Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=20260606-flow-qa">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow" id="weekLabel">Week 1</div>
        <h1 id="dayTitle">Monday</h1>
      </div>
      <div class="topActions">
        <button id="homeBtn" class="ghost" type="button">Home</button>
        <button id="overviewBtn" class="ghost" type="button">Overview</button>
      </div>
    </header>

    <section class="selector">
      <select id="weekSelect"></select>
      <select id="daySelect"></select>
    </section>

    <section class="progressWrap" aria-live="polite">
      <div class="progressText"><span id="progressText">0 of 0 complete</span><span id="scoreText"></span></div>
      <div class="progress"><div id="progressBar"></div></div>
    </section>

    <main id="screen" tabindex="-1"></main>

    <footer class="nav">
      <div class="navControls">
        <button id="prevBtn" aria-label="Previous exercise">←</button>
        <button id="doneBtn" class="primary">Done ✓</button>
        <button id="nextBtn" aria-label="Next exercise">→</button>
      </div>
      <button id="resetBtn" class="resetFooter" type="button">Reset Day</button>
    </footer>
  </div>

  <script src="app.js?v=20260606-flow-qa"></script>
</body>
</html>
